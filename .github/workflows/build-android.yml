name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Récupérer le code source
      # ─────────────────────────────────────────
      - name: Checkout du code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Configurer Node.js 20
      # ─────────────────────────────────────────
      - name: Configuration Node.js 
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ─────────────────────────────────────────
      # 3. Configurer Java 17
      # ─────────────────────────────────────────
      - name: Configuration Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ─────────────────────────────────────────
      # 4. Configurer Android SDK
      # ─────────────────────────────────────────
      - name: Configuration Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          accept-android-sdk-licenses: true

      # ─────────────────────────────────────────
      # 5. Cache Gradle
      # ─────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/generated/source/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─────────────────────────────────────────
      # 6. Installer les dépendances frontend
      # ─────────────────────────────────────────
      - name: Installation des dépendances npm
        working-directory: frontend
        run: npm ci

      # ─────────────────────────────────────────
      # 7. Build Next.js static export
      # ─────────────────────────────────────────
      - name: Build Next.js
        working-directory: frontend
        run: |
          echo "API URL: $NEXT_PUBLIC_API_URL"
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # ─────────────────────────────────────────
      # 8. Synchroniser Capacitor
      # ─────────────────────────────────────────
      - name: Initialisation Capacitor Android
        working-directory: frontend
        run: |
          if [ ! -d "../mobile/generated/source/android" ]; then
            npx cap add android
          fi 
          npx cap sync android

      # ─────────────────────────────────────────
      # 9. Rendre Gradle exécutable
      # ─────────────────────────────────────────
      - name: Permissions Gradle
        working-directory: mobile/generated/source/android
        run: chmod +x gradlew

      # ─────────────────────────────────────────
      # 10. Compiler l'APK
      # ─────────────────────────────────────────
      - name: Compilation APK Debug
        working-directory: mobile/generated/source/android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g"

      # ─────────────────────────────────────────
      # 11. Upload APK comme artifact
      # ─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: mobile/generated/source/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ─────────────────────────────────────────
      # 12. Résumé du build
      # ─────────────────────────────────────────
      - name: Résumé du build
        run: |
          APK_PATH="mobile/generated/source/android/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## ✅ Build Android réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Information | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Fichier | app-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| Taille | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY