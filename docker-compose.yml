services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: prod
    container_name: quiz_app_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_API_URL=${API_PUBLIC_URL}
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - quizz_app_network
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: prod
    container_name: quiz_app_backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    networks:
      - quizz_app_network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: quiz_app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quizz_app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  quizz_app_network: