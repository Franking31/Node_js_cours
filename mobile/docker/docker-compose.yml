version: '3.8'
services:
  android-builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../Frontend:/workspace/app
      - ../generated:/workspace/generated
      - android-npm-cache:/root/.npm
      - android-gradle-cache:/root/.gradle
    env_file:
      - ../.env
    environment:
      - APP_NAME=${APP_NAME:-QuizAI}
      - APP_ID=${APP_ID:-com.keyce.quizai}
    restart: "no"

volumes:
  android-npm-cache:
  android-gradle-cache: