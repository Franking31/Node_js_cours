<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réservations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeece8;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b68;
      --text-tertiary: #9e9c97;
      --border-light: rgba(0,0,0,0.1);
      --border-medium: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 500;
    }
    .header h1 i { margin-right: 6px; }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
    }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 500; }

    /* Panel */
    .panel {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: span 2; }
    label { font-size: 12px; color: var(--text-secondary); }
    input, select {
      width: 100%;
      padding: 7px 10px;
      font-size: 14px;
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--text-primary); }
    .form-actions { display: flex; gap: 8px; margin-top: 14px; }

    /* Buttons */
    .btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: none;
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .btn-secondary:hover { background: var(--bg-secondary); }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 16px;
      padding: 4px 6px;
      border-radius: var(--radius-md);
      line-height: 1;
    }
    .btn-icon:hover { background: var(--bg-secondary); color: var(--text-primary); }

    /* Filter row */
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .filter-row input { flex: 1; }
    .filter-row select { max-width: 160px; }

    /* List */
    .list-header {
      display: grid;
      grid-template-columns: 2fr 80px 70px 110px 72px;
      gap: 8px;
      padding: 0 4px 8px;
      border-bottom: 0.5px solid var(--border-light);
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .res-row {
      display: grid;
      grid-template-columns: 2fr 80px 70px 110px 72px;
      gap: 8px;
      padding: 10px 4px;
      border-bottom: 0.5px solid var(--border-light);
      align-items: center;
    }
    .res-row:last-child { border-bottom: none; }
    .name-cell { font-size: 14px; font-weight: 500; }
    .name-cell small { display: block; font-size: 12px; font-weight: 400; color: var(--text-secondary); }
    .cell { font-size: 13px; }
    .row-actions { display: flex; gap: 2px; justify-content: flex-end; }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 99px;
      cursor: pointer;
      user-select: none;
    }
    .badge-confirmed { background: #EAF3DE; color: #3B6D11; }
    .badge-pending   { background: #FAEEDA; color: #854F0B; }
    .badge-cancelled { background: #FCEBEB; color: #A32D2D; }

    /* Empty */
    .empty { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
      .stats { grid-template-columns: 1fr 1fr; }
      .list-header, .res-row { grid-template-columns: 2fr 70px 100px 60px; }
      .list-header span:nth-child(3), .res-row .cell:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1><i class="ti ti-tool-kitchen-2"></i> Réservations</h1>
    <button class="btn-primary" onclick="toggleForm()">
      <i class="ti ti-plus"></i> Nouvelle
    </button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Confirmées</div>
      <div class="stat-value" id="stat-confirmed">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Couverts aujourd'hui</div>
      <div class="stat-value" id="stat-covers">0</div>
    </div>
  </div>

  <!-- Form panel -->
  <div class="panel" id="form-panel" style="display:none;">
    <div class="panel-title">Nouvelle réservation</div>
    <div class="form-grid">
      <div class="form-group">
        <label for="f-name">Nom *</label>
        <input type="text" id="f-name" placeholder="Dupont" />
      </div>
      <div class="form-group">
        <label for="f-phone">Téléphone</label>
        <input type="tel" id="f-phone" placeholder="06 12 34 56 78" />
      </div>
      <div class="form-group">
        <label for="f-date">Date *</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label for="f-time">Heure</label>
        <input type="time" id="f-time" value="19:30" />
      </div>
      <div class="form-group">
        <label for="f-covers">Couverts</label>
        <input type="number" id="f-covers" min="1" max="20" value="2" />
      </div>
      <div class="form-group">
        <label for="f-status">Statut</label>
        <select id="f-status">
          <option value="confirmed">Confirmé</option>
          <option value="pending">En attente</option>
        </select>
      </div>
      <div class="form-group full">
        <label for="f-note">Note</label>
        <input type="text" id="f-note" placeholder="Allergies, occasion spéciale..." />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="addReservation()">Enregistrer</button>
      <button class="btn-secondary" onclick="toggleForm()">Annuler</button>
    </div>
  </div>

  <!-- List panel -->
  <div class="panel">
    <div class="filter-row">
      <input type="text" id="search" placeholder="Rechercher par nom, note..." oninput="render()" />
      <select id="filter-status" onchange="render()">
        <option value="">Tous les statuts</option>
        <option value="confirmed">Confirmé</option>
        <option value="pending">En attente</option>
        <option value="cancelled">Annulé</option>
      </select>
    </div>
    <div class="list-header">
      <span>Client</span>
      <span>Date</span>
      <span>Heure</span>
      <span>Statut</span>
      <span></span>
    </div>
    <div id="res-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  let reservations = [
    { id: 1, name: "Martin",  phone: "06 11 22 33 44", date: getTodayStr(), time: "19:30", covers: 4, status: "confirmed", note: "Anniversaire" },
    { id: 2, name: "Leclerc", phone: "06 55 44 33 22", date: getTodayStr(), time: "20:00", covers: 2, status: "confirmed", note: "" },
    { id: 3, name: "Bernard", phone: "07 66 77 88 99", date: getTomorrowStr(), time: "12:30", covers: 6, status: "pending",   note: "Végétarien" },
  ];
  let nextId = 4;

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function getTodayStr() {
    return new Date().toISOString().split('T')[0];
  }
  function getTomorrowStr() {
    const d = new Date(); d.setDate(d.getDate() + 1);
    return d.toISOString().split('T')[0];
  }
  function formatDate(str) {
    const [y, m, d] = str.split('-');
    return `${d}/${m}`;
  }

  // ─── UI ───────────────────────────────────────────────────────────────────
  function toggleForm() {
    const panel = document.getElementById('form-panel');
    const open = panel.style.display === 'none';
    panel.style.display = open ? 'block' : 'none';
    if (open) {
      document.getElementById('f-date').value = getTodayStr();
      document.getElementById('f-name').focus();
    }
  }

  function addReservation() {
    const name = document.getElementById('f-name').value.trim();
    const date = document.getElementById('f-date').value;
    if (!name) { showToast('Le nom est requis'); return; }
    if (!date)  { showToast('La date est requise'); return; }

    reservations.push({
      id:     nextId++,
      name,
      phone:  document.getElementById('f-phone').value.trim(),
      date,
      time:   document.getElementById('f-time').value,
      covers: parseInt(document.getElementById('f-covers').value) || 2,
      status: document.getElementById('f-status').value,
      note:   document.getElementById('f-note').value.trim(),
    });

    // reset form fields
    ['f-name','f-phone','f-note'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-covers').value = 2;
    document.getElementById('f-status').value = 'confirmed';
    document.getElementById('form-panel').style.display = 'none';

    showToast('Réservation ajoutée ✓');
    render();
  }

  function deleteReservation(id) {
    reservations = reservations.filter(r => r.id !== id);
    showToast('Réservation supprimée');
    render();
  }

  function cycleStatus(id) {
    const r = reservations.find(r => r.id === id);
    if (!r) return;
    const cycle = { confirmed: 'pending', pending: 'cancelled', cancelled: 'confirmed' };
    r.status = cycle[r.status];
    render();
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function render() {
    const search       = document.getElementById('search').value.toLowerCase();
    const filterStatus = document.getElementById('filter-status').value;
    const today        = getTodayStr();

    const labels = { confirmed: 'Confirmé', pending: 'En attente', cancelled: 'Annulé' };

    // Stats
    document.getElementById('stat-total').textContent     = reservations.length;
    document.getElementById('stat-confirmed').textContent = reservations.filter(r => r.status === 'confirmed').length;
    document.getElementById('stat-covers').textContent    = reservations
      .filter(r => r.date === today && r.status === 'confirmed')
      .reduce((sum, r) => sum + r.covers, 0);

    // Filter + sort
    const list = reservations
      .filter(r => {
        const matchSearch = r.name.toLowerCase().includes(search)
          || r.phone.includes(search)
          || r.note.toLowerCase().includes(search);
        const matchStatus = !filterStatus || r.status === filterStatus;
        return matchSearch && matchStatus;
      })
      .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

    const el = document.getElementById('res-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty">Aucune réservation trouvée</div>';
      return;
    }

    el.innerHTML = list.map(r => `
      <div class="res-row">
        <div class="name-cell">
          ${escHtml(r.name)}
          <small>${r.covers} couvert${r.covers > 1 ? 's' : ''}${r.note ? ' · ' + escHtml(r.note) : ''}</small>
        </div>
        <div class="cell">${formatDate(r.date)}</div>
        <div class="cell">${r.time}</div>
        <div class="cell">
          <span class="badge badge-${r.status}" onclick="cycleStatus(${r.id})" title="Cliquer pour changer le statut">
            ${labels[r.status]}
          </span>
        </div>
        <div class="row-actions">
          <button class="btn-icon" onclick="cycleStatus(${r.id})" title="Changer statut">
            <i class="ti ti-refresh"></i>
          </button>
          <button class="btn-icon" onclick="deleteReservation(${r.id})" title="Supprimer">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
